<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin · Photography Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  /* Sage palette + warm off-white surface, ported from the personality site. */
  :root{
    --w:#fafaf8;--off:#f0efeb;
    --accent:#40916c;--accent-lt:#edf7f1;--accent-dk:#2d6a4f;
    --accent-soft:#d8f3dc;--accent-bright:#74c69d;
    --ink:#141917;--ink-soft:#2e3830;--muted:#5d7869;--bd:#cfdcd3;
    --red:#dc2626;--red-lt:#fef2f2;--green:#059669;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'DM Sans',system-ui,sans-serif;
    --ease:cubic-bezier(.25,.46,.45,.94);
    --card-shadow:0 2px 16px rgba(45,106,79,.06);
  }
  body{
    background:var(--off);color:var(--ink);
    font-family:var(--sans);font-weight:400;font-size:14.5px;line-height:1.6;
    -webkit-font-smoothing:antialiased;min-height:100vh;
    position:relative;
  }
  /* Subtle film-grain so warm off-white isn't flat. */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.28;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  }
  body>*{position:relative;z-index:1}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{
    font:inherit;width:100%;padding:9px 12px;
    background:var(--w);border:1px solid var(--bd);border-radius:6px;
    transition:border-color .15s;
  }
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt)}
  textarea{resize:vertical;min-height:70px}
  label{display:block;font-size:12px;font-weight:500;color:var(--ink-soft);margin-bottom:5px;letter-spacing:.01em}
  .row{display:grid;gap:12px}
  .row.cols-2{grid-template-columns:1fr 1fr}
  .row.cols-3{grid-template-columns:1fr 1fr 1fr}
  .row.cols-5{grid-template-columns:repeat(5,1fr)}
  @media(max-width:720px){
    .row.cols-2,.row.cols-3,.row.cols-5{grid-template-columns:1fr}
  }

  /* ── HEADER ── */
  header{
    position:sticky;top:0;z-index:50;
    background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--bd);
    padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
  }
  .logo{font-family:var(--serif);font-style:italic;font-size:18px}
  .logo em{color:var(--accent)}
  .header-right{display:flex;align-items:center;gap:14px;font-size:13px;font-weight:400;color:var(--ink-soft)}
  .header-right a{font-size:13px}

  /* ── BUTTONS ── */
  .btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 16px;border-radius:6px;font-weight:500;font-size:13px;
    transition:background .15s,color .15s,border-color .15s;
    border:1px solid transparent;
  }
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(63,109,94,.18)}
  .btn-primary:hover{background:var(--accent-dk);transform:translateY(-1px);box-shadow:0 4px 12px rgba(63,109,94,.22)}
  .btn-primary:active{transform:translateY(0);box-shadow:0 1px 2px rgba(63,109,94,.18)}
  .btn-ghost{border-color:var(--bd);color:var(--ink);background:var(--w)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt)}
  .btn-danger{color:var(--red);border-color:var(--bd);background:var(--w)}
  .btn-danger:hover{background:var(--red-lt);border-color:var(--red)}
  .btn-sm{padding:5px 10px;font-size:12px}
  .btn[disabled]{opacity:.5;cursor:not-allowed}

  /* ── LAYOUT ── */
  main{max-width:1100px;margin:0 auto;padding:28px}
  section{
    background:var(--w);border:1px solid var(--bd);border-radius:10px;
    padding:22px;margin-bottom:18px;
  }
  section h2{
    font-family:var(--serif);font-size:23px;font-weight:500;
    margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;
  }
  section h2 .count{
    font-family:var(--sans);font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.04em;
    letter-spacing:.15em;text-transform:uppercase;
  }
  hr{border:none;border-top:1px solid var(--bd);margin:18px 0}

  /* ── LOGIN ── */
  .login-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:
      radial-gradient(circle at 30% 20%,var(--accent-lt) 0%,transparent 60%),
      radial-gradient(circle at 80% 90%,#eef5f1 0%,transparent 55%),
      var(--off);
  }
  .login-card{
    width:100%;max-width:380px;background:var(--w);
    border:1px solid var(--bd);border-radius:12px;padding:32px;
    box-shadow:0 24px 48px -24px rgba(63,109,94,.18);
    animation:fadeUp .42s var(--ease) both;
  }
  .login-card h1{
    font-family:var(--serif);font-size:28px;font-weight:500;margin-bottom:6px;
  }
  .login-card .sub{color:var(--ink-soft);font-size:13.5px;font-weight:400;margin-bottom:22px}

  /* ── SERIES LIST ── */
  .series-card{
    border:1px solid var(--bd);border-radius:10px;
    padding:16px;margin-bottom:14px;background:var(--w);
  }
  .series-card .head{
    display:flex;align-items:center;gap:14px;cursor:pointer;
  }
  .series-card .cover-thumb{
    width:72px;height:72px;background:var(--off);border-radius:6px;
    object-fit:cover;flex-shrink:0;
  }
  .series-card .meta{flex:1;min-width:0}
  .series-card .meta .title{font-weight:500;font-size:15px}
  .series-card .meta .sub{font-size:12px;font-weight:400;color:var(--muted)}
  .series-card .actions{display:flex;gap:6px;flex-wrap:wrap}
  .series-card .body{
    margin-top:14px;padding-top:14px;border-top:1px solid var(--bd);display:none;
  }
  .series-card.open .body{display:block}
  .chev{transition:transform .2s;color:var(--muted);font-size:12px}
  .series-card.open .chev{transform:rotate(90deg)}

  /* ── PHOTOS GRID ── */
  .photos{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:10px;margin-top:12px;
  }
  .photo{
    position:relative;background:var(--off);border-radius:6px;overflow:hidden;
    aspect-ratio:4/3;border:1px solid var(--bd);
  }
  .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .photo .ph-info{
    position:absolute;inset:auto 0 0 0;background:linear-gradient(transparent,rgba(0,0,0,.85));
    color:#fff;padding:18px 8px 6px;font-size:11px;line-height:1.3;
  }
  .photo .ph-info .t{font-weight:500;margin-bottom:1px;text-shadow:0 1px 2px rgba(0,0,0,.6)}
  .photo .ph-info .e{opacity:.85;font-size:10px}
  .photo .ph-actions{
    position:absolute;top:6px;right:6px;display:flex;gap:4px;
    opacity:0;transition:opacity .15s;
  }
  .photo:hover .ph-actions{opacity:1}
  .ph-btn{
    background:rgba(255,255,255,.95);border-radius:4px;padding:4px 7px;
    font-size:11px;font-weight:500;color:var(--ink);
  }
  .ph-btn.del{color:var(--red)}
  .ph-btn:hover{background:#fff}

  /* ── DROPZONE ── */
  .drop{
    border:2px dashed var(--bd);border-radius:8px;padding:22px;text-align:center;
    color:var(--muted);background:var(--off);transition:border-color .18s,background .18s,transform .18s;
  }
  .drop.hover{border-color:var(--accent);background:var(--accent-lt);color:var(--accent-dk);transform:scale(1.01)}
  .drop input[type=file]{display:none}

  /* ── UPLOAD QUEUE (per-file confirm + progress) ── */
  .upload-queue{
    margin-top:14px;border:1px solid var(--bd);border-radius:8px;
    background:var(--w);overflow:hidden;
    animation:fadeUp .25s var(--ease) both;
  }
  .upload-queue-head{
    padding:10px 14px;border-bottom:1px solid var(--bd);
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    font-size:12px;color:var(--muted);background:var(--off);
  }
  .upload-queue-head strong{color:var(--ink);font-weight:600}
  .upload-row{
    display:grid;grid-template-columns:48px 1fr 200px 90px;gap:12px;
    align-items:center;padding:10px 14px;border-bottom:1px solid var(--bd);
    transition:background .18s;
  }
  .upload-row:last-child{border-bottom:none}
  .upload-row .thumb{
    width:48px;height:48px;border-radius:6px;background:var(--off);
    object-fit:cover;display:block;border:1px solid var(--bd);
  }
  .upload-row .filename{
    font-size:12px;color:var(--ink);word-break:break-all;
    line-height:1.4;
  }
  .upload-row .filesize{font-size:11px;color:var(--muted);margin-top:2px}
  .upload-row .date-input{
    font-size:12px;padding:6px 8px;
  }
  .upload-row .status{font-size:11px;color:var(--muted);text-align:right}
  .upload-row.done .status{color:var(--green);font-weight:600}
  .upload-row.error{background:var(--red-lt)}
  .upload-row.error .status{color:var(--red);font-weight:600}
  .progress{
    height:4px;background:var(--bd);border-radius:99px;overflow:hidden;
    margin-top:6px;
  }
  .progress-bar{
    height:100%;background:var(--accent);width:0%;
    transition:width .15s linear;
  }
  .upload-row.done .progress-bar{background:var(--green)}
  .upload-row.error .progress-bar{background:var(--red)}
  .upload-queue-foot{
    padding:10px 14px;display:flex;justify-content:flex-end;gap:8px;
    border-top:1px solid var(--bd);background:var(--off);
  }
  @media(max-width:720px){
    .upload-row{grid-template-columns:40px 1fr;gap:10px}
    .upload-row .date-input,.upload-row .status{grid-column:1/-1;text-align:left}
  }

  /* ── TOAST ── */
  .toast{
    position:fixed;bottom:24px;right:24px;z-index:200;
    background:var(--ink);color:#fff;border-radius:8px;padding:11px 18px;
    font-size:13px;box-shadow:0 10px 28px rgba(0,0,0,.22);
    opacity:0;transform:translateY(12px) scale(.96);transition:opacity .22s var(--ease),transform .26s var(--ease);
    pointer-events:none;max-width:340px;
  }
  .toast.show{opacity:1;transform:translateY(0) scale(1)}
  .toast.error{background:var(--red)}
  .toast.success{background:var(--accent-dk)}

  /* ── MODAL ── */
  .modal{
    position:fixed;inset:0;z-index:100;display:none;
    align-items:center;justify-content:center;padding:24px;
    background:rgba(14,14,14,.55);backdrop-filter:blur(6px);
    opacity:0;transition:opacity .22s var(--ease);
  }
  .modal.open{display:flex;opacity:1}
  .modal-card{
    background:var(--w);border-radius:12px;padding:24px;
    width:100%;max-width:520px;max-height:90vh;overflow:auto;
    box-shadow:0 24px 64px -16px rgba(0,0,0,.32);
    transform:translateY(8px) scale(.98);
    transition:transform .26s var(--ease);
  }
  .modal.open .modal-card{transform:translateY(0) scale(1)}
  .modal-card h3{
    font-family:var(--serif);font-size:21px;font-weight:500;margin-bottom:14px;
  }
  .modal-actions{
    display:flex;gap:8px;justify-content:flex-end;margin-top:18px;
  }

  /* ── EMPTY ── */
  .empty{
    text-align:center;padding:36px;color:var(--muted);font-size:13px;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .series-card{animation:fadeUp .32s var(--ease) both}
  .series-card:nth-child(2){animation-delay:.04s}
  .series-card:nth-child(3){animation-delay:.08s}
  .series-card:nth-child(4){animation-delay:.12s}
  .series-card:nth-child(5){animation-delay:.16s}
  .series-card:nth-child(6){animation-delay:.2s}
  .photo{animation:fadeUp .28s var(--ease) both;transition:transform .2s var(--ease),box-shadow .2s var(--ease)}
  .photo:hover{transform:translateY(-2px);box-shadow:0 6px 16px -8px rgba(63,109,94,.32)}
  .chev{transition:transform .22s var(--ease) !important}
</style>
</head>
<body>

<!-- ── LOGIN VIEW ── -->
<div id="view-login" class="login-wrap">
  <form class="login-card" id="login-form">
    <h1>Admin <em style="color:var(--accent);font-style:italic">login</em></h1>
    <div class="sub">Sign in to manage your photography gallery.</div>

    <label for="li-user">Username</label>
    <input id="li-user" name="username" autocomplete="username" required/>

    <div style="height:12px"></div>

    <label for="li-pass">Password</label>
    <input id="li-pass" name="password" type="password" autocomplete="current-password" required/>

    <div style="height:18px"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" type="submit">Sign in</button>
    <div id="li-err" style="color:var(--red);font-size:12px;margin-top:10px;min-height:14px"></div>
  </form>
</div>

<!-- ── DASHBOARD VIEW ── -->
<div id="view-dash" style="display:none">
  <header>
    <div class="logo">irvan <em>maulana</em> · admin</div>
    <div class="header-right">
      <a href="/" target="_blank">View site ↗</a>
      <button class="btn btn-ghost btn-sm" id="btn-logout">Sign out</button>
    </div>
  </header>

  <main>
    <!-- Add Series form -->
    <section>
      <h2>New series <span class="count">add</span></h2>
      <form id="form-new-series">
        <div class="row cols-3">
          <div><label>Number</label><input name="num" placeholder="Series 06"/></div>
          <div><label>Name *</label><input name="name" required placeholder="Bali"/></div>
          <div><label>Year</label><input name="year" placeholder="2025"/></div>
        </div>
        <div style="height:12px"></div>
        <label>Description</label>
        <textarea name="description" placeholder="Short description shown on the series page."></textarea>
        <div style="height:12px"></div>
        <div class="row cols-2">
          <div>
            <label>Cover image (upload)</label>
            <input type="file" name="cover" accept="image/*"/>
          </div>
          <div>
            <label>or Cover URL</label>
            <input name="cover_url" placeholder="https://res.cloudinary.com/.../cover.jpg"/>
          </div>
        </div>
        <div style="height:14px"></div>
        <button class="btn btn-primary" type="submit">Create series</button>
      </form>
    </section>

    <!-- Series list -->
    <section>
      <h2>Series <span class="count" id="series-count"></span></h2>
      <div id="series-list"></div>
    </section>
  </main>
</div>

<!-- ── EDIT MODALS ── -->
<div class="modal" id="modal-edit-series">
  <form class="modal-card" id="form-edit-series">
    <h3>Edit series</h3>
    <input type="hidden" name="id"/>
    <div class="row cols-3">
      <div><label>Number</label><input name="num"/></div>
      <div><label>Name *</label><input name="name" required/></div>
      <div><label>Year</label><input name="year"/></div>
    </div>
    <div style="height:12px"></div>
    <label>Description</label>
    <textarea name="description"></textarea>
    <div style="height:12px"></div>
    <div class="row cols-2">
      <div><label>Replace cover (upload)</label><input type="file" name="cover" accept="image/*"/></div>
      <div><label>or Cover URL</label><input name="cover_url"/></div>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" data-close>Cancel</button>
      <button type="submit" class="btn btn-primary">Save</button>
    </div>
  </form>
</div>

<div class="modal" id="modal-edit-photo">
  <form class="modal-card" id="form-edit-photo">
    <h3>Edit photo</h3>
    <input type="hidden" name="id"/>
    <label>Title</label><input name="title"/>
    <div style="height:10px"></div>
    <div class="row cols-2">
      <div><label>Camera</label><input name="cam"/></div>
      <div><label>Lens</label><input name="lens"/></div>
    </div>
    <div style="height:10px"></div>
    <div class="row cols-3">
      <div><label>ISO</label><input name="iso"/></div>
      <div><label>Shutter</label><input name="ss"/></div>
      <div><label>Aperture</label><input name="ap"/></div>
    </div>
    <div style="height:10px"></div>
    <label>Date taken <span style="color:var(--muted);font-weight:500">(optional — falls back to series year)</span></label>
    <input name="taken_at" type="datetime-local" step="60"/>
    <div style="height:10px"></div>
    <div class="row cols-2">
      <div><label>Replace image (upload)</label><input type="file" name="image" accept="image/*"/></div>
      <div><label>or Image URL</label><input name="img"/></div>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" data-close>Cancel</button>
      <button type="submit" class="btn btn-primary">Save</button>
    </div>
  </form>
</div>

<div id="toast" class="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────
const state = {
  token: localStorage.getItem('admin_token') || null,
  series: [],
  openSeriesId: null,
};

// ─── Helpers ─────────────────────────────────────────────────────────────
function $(sel, root){ return (root || document).querySelector(sel); }
function $$(sel, root){ return Array.from((root || document).querySelectorAll(sel)); }
function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let toastTimer;
function toast(msg, type){
  const el = $('#toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.className = 'toast'; }, 2800);
}

async function api(method, path, body, opts){
  opts = opts || {};
  const headers = {};
  if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
  const init = { method, headers };
  if (body instanceof FormData) {
    init.body = body;
  } else if (body !== undefined) {
    headers['Content-Type'] = 'application/json';
    init.body = JSON.stringify(body);
  }
  const res = await fetch(path, init);
  if (res.status === 401) {
    logout(true);
    throw new Error('Session expired');
  }
  let data = null;
  const ctype = res.headers.get('content-type') || '';
  if (ctype.includes('application/json')) {
    data = await res.json().catch(()=>null);
  }
  if (!res.ok) {
    throw new Error((data && data.error) || ('HTTP ' + res.status));
  }
  return data;
}

// ─── Auth ────────────────────────────────────────────────────────────────
function showLogin(){
  $('#view-login').style.display = 'flex';
  $('#view-dash').style.display = 'none';
}
function showDash(){
  $('#view-login').style.display = 'none';
  $('#view-dash').style.display = 'block';
  loadSeries();
}
function logout(silent){
  state.token = null;
  localStorage.removeItem('admin_token');
  showLogin();
  if (!silent) toast('Signed out');
}

$('#login-form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  $('#li-err').textContent = '';
  const fd = new FormData(e.target);
  try {
    const data = await fetch('/api/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username: fd.get('username'), password: fd.get('password') }),
    }).then(r => r.json().then(j => ({ ok: r.ok, j })));
    if (!data.ok) throw new Error((data.j && data.j.error) || 'Login failed');
    state.token = data.j.token;
    localStorage.setItem('admin_token', state.token);
    showDash();
    toast('Welcome back', 'success');
  } catch (err) {
    $('#li-err').textContent = err.message;
  }
});

$('#btn-logout').addEventListener('click', ()=>logout());

// ─── Load + render series ────────────────────────────────────────────────
async function loadSeries(){
  try {
    state.series = await api('GET', '/api/series');
    renderSeries();
  } catch (err) {
    toast('Failed to load: ' + err.message, 'error');
  }
}

function renderSeries(){
  $('#series-count').textContent = state.series.length + ' total';
  const list = $('#series-list');
  if (!state.series.length) {
    list.innerHTML = '<div class="empty">No series yet — create one above.</div>';
    return;
  }
  list.innerHTML = '';
  state.series.forEach(s => {
    const card = document.createElement('div');
    card.className = 'series-card';
    card.dataset.id = s.id;
    if (state.openSeriesId === s.id) card.classList.add('open');
    card.innerHTML = `
      <div class="head">
        <img class="cover-thumb" src="${escapeHtml(s.cover) || ''}" alt="" onerror="this.style.visibility='hidden'"/>
        <div class="meta">
          <div class="title">${escapeHtml(s.name)}</div>
          <div class="sub">${escapeHtml(s.num)} · ${escapeHtml(s.year)} · ${s.photos.length} photos</div>
        </div>
        <span class="chev">▶</span>
        <div class="actions" data-stop>
          <button class="btn btn-ghost btn-sm" data-action="edit-series">Edit</button>
          <button class="btn btn-danger btn-sm" data-action="delete-series">Delete</button>
        </div>
      </div>
      <div class="body">
        <div class="drop" data-drop>
          <strong>Drop images here</strong> or <label style="color:var(--accent);cursor:pointer;display:inline">
            browse<input type="file" multiple accept="image/*" data-upload/>
          </label>
          <div style="font-size:12px;margin-top:4px">JPG, PNG, WebP — up to ${(window.MAX_UPLOAD_MB || 25)} MB each</div>
        </div>
        <div class="upload-queue-host"></div>
        <div class="photos"></div>
      </div>
    `;
    list.appendChild(card);
    renderPhotos(card, s);
    bindCardEvents(card, s);
  });
}

function renderPhotos(card, series){
  const grid = $('.photos', card);
  grid.innerHTML = '';
  if (!series.photos.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">No photos yet — upload above.</div>';
    return;
  }
  series.photos.forEach(p => {
    const el = document.createElement('div');
    el.className = 'photo';
    el.innerHTML = `
      <img src="${escapeHtml(p.img)}" alt="${escapeHtml(p.title)}" loading="lazy" onerror="this.style.opacity=.3"/>
      <div class="ph-actions">
        <button class="ph-btn" data-action="edit-photo" data-id="${p.id}">Edit</button>
        <button class="ph-btn del" data-action="delete-photo" data-id="${p.id}">×</button>
      </div>
      <div class="ph-info">
        <div class="t">${escapeHtml(p.title || '(untitled)')}</div>
        <div class="e">${escapeHtml([p.cam, p.lens, p.iso, p.ss, p.ap].filter(Boolean).join(' · ') || '—')}</div>
      </div>`;
    grid.appendChild(el);
  });
}

function bindCardEvents(card, series){
  $('.head', card).addEventListener('click', (e)=>{
    if (e.target.closest('[data-stop]')) return;
    const wasOpen = card.classList.contains('open');
    state.openSeriesId = wasOpen ? null : series.id;
    renderSeries();
  });

  $$('[data-action]', card).forEach(btn => {
    btn.addEventListener('click', async (e)=>{
      e.stopPropagation();
      const act = btn.dataset.action;
      if (act === 'edit-series') openEditSeries(series);
      else if (act === 'delete-series') deleteSeries(series);
      else if (act === 'edit-photo') {
        const photo = series.photos.find(p => p.id == btn.dataset.id);
        if (photo) openEditPhoto(series, photo);
      } else if (act === 'delete-photo') {
        const photo = series.photos.find(p => p.id == btn.dataset.id);
        if (photo) deletePhoto(series, photo);
      }
    });
  });

  // Drop zone
  const drop = $('[data-drop]', card);
  const fileInput = $('[data-upload]', card);
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('hover'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('hover'));
  drop.addEventListener('drop', e => {
    e.preventDefault();
    drop.classList.remove('hover');
    if (e.dataTransfer.files.length) showUploadQueue(card, series, e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) showUploadQueue(card, series, fileInput.files);
    fileInput.value = '';
  });
}

// ─── Photo upload (per-file with date + progress) ────────────────────────
function formatBytes(n){
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(0) + ' KB';
  return (n/1024/1024).toFixed(1) + ' MB';
}

// Default for the per-file date picker: now, in the user's local timezone,
// rendered in the YYYY-MM-DDTHH:MM format that <input type="datetime-local"> needs.
function defaultLocalDateTime(){
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// Show a per-file queue under the dropzone with a date input + per-file
// progress bar. Each file is uploaded as its own multipart request so we
// can attach an XHR upload progress listener cleanly.
function showUploadQueue(card, series, fileList){
  const host = $('.upload-queue-host', card);
  if (!host) return;
  // Wipe any previous queue (e.g. user re-selecting before clicking upload)
  host.innerHTML = '';

  const files = Array.from(fileList);
  const defaultDate = defaultLocalDateTime();
  const queue = document.createElement('div');
  queue.className = 'upload-queue';
  queue.innerHTML = `
    <div class="upload-queue-head">
      <span><strong>${files.length}</strong> file${files.length === 1 ? '' : 's'} ready</span>
      <span style="font-size:11px;letter-spacing:.05em;text-transform:uppercase">Set date taken — leave blank to skip</span>
    </div>
    <div class="upload-queue-body"></div>
    <div class="upload-queue-foot">
      <button type="button" class="btn btn-ghost btn-sm" data-cancel>Cancel</button>
      <button type="button" class="btn btn-primary btn-sm" data-start>Upload ${files.length} file${files.length === 1 ? '' : 's'}</button>
    </div>
  `;
  host.appendChild(queue);

  const body = $('.upload-queue-body', queue);
  const rows = files.map((file, idx) => {
    const row = document.createElement('div');
    row.className = 'upload-row';
    row.dataset.idx = idx;
    const objectUrl = URL.createObjectURL(file);
    row.innerHTML = `
      <img class="thumb" src="${objectUrl}" alt=""/>
      <div>
        <div class="filename">${escapeHtml(file.name)}</div>
        <div class="filesize">${formatBytes(file.size)}</div>
        <div class="progress"><div class="progress-bar"></div></div>
      </div>
      <input class="date-input" type="datetime-local" step="60" value="${defaultDate}"/>
      <span class="status">Pending</span>
    `;
    body.appendChild(row);
    return { row, file, objectUrl };
  });

  $('[data-cancel]', queue).addEventListener('click', () => {
    rows.forEach(r => URL.revokeObjectURL(r.objectUrl));
    queue.remove();
  });

  $('[data-start]', queue).addEventListener('click', async () => {
    const startBtn = $('[data-start]', queue);
    const cancelBtn = $('[data-cancel]', queue);
    startBtn.disabled = true;
    cancelBtn.disabled = true;
    let done = 0, errors = 0;
    for (const r of rows) {
      const dateInput = $('.date-input', r.row);
      // Convert the wall-time picker value to a UTC ISO string so the server
      // (which may run in UTC) and viewer (in any TZ) round-trip the same
      // local wall time the user picked.
      const takenLocal = (dateInput.value || '').trim();
      let taken_at = '';
      if (takenLocal) {
        const d = new Date(takenLocal);
        if (!Number.isNaN(d.getTime())) taken_at = d.toISOString();
      }
      try {
        await uploadOneWithProgress(series.id, r.file, taken_at, r.row);
        done++;
      } catch (err) {
        errors++;
        const status = $('.status', r.row);
        r.row.classList.add('error');
        status.textContent = err.message || 'Failed';
      }
    }
    rows.forEach(r => URL.revokeObjectURL(r.objectUrl));
    if (errors) {
      toast(`Uploaded ${done}, ${errors} failed`, 'error');
    } else {
      toast(`Uploaded ${done} photo${done === 1 ? '' : 's'}`, 'success');
    }
    state.openSeriesId = series.id;
    // Auto-dismiss the queue panel on full success after a brief delay so the
    // user sees the green “Done” state before it disappears.
    if (!errors) setTimeout(() => queue.remove(), 600);
    loadSeries();
  });
}

// Single-file POST to /api/series/:id/photos with progress reporting.
// Resolves on 2xx, rejects with Error otherwise.
function uploadOneWithProgress(seriesId, file, takenAt, rowEl){
  return new Promise((resolve, reject) => {
    const fd = new FormData();
    fd.append('photos', file);
    fd.append('meta', JSON.stringify([{ taken_at: takenAt || null }]));

    const xhr = new XMLHttpRequest();
    xhr.open('POST', `/api/series/${seriesId}/photos`);
    if (state.token) xhr.setRequestHeader('Authorization', 'Bearer ' + state.token);

    const bar = $('.progress-bar', rowEl);
    const status = $('.status', rowEl);
    status.textContent = '0%';

    xhr.upload.addEventListener('progress', (e) => {
      if (!e.lengthComputable) return;
      const pct = Math.round((e.loaded / e.total) * 100);
      bar.style.width = pct + '%';
      // Once bytes are fully sent we still wait for the server response
      // (Cloudinary upload + DB insert), so show "Saving…" beyond 100%.
      status.textContent = pct >= 100 ? 'Saving…' : pct + '%';
    });

    xhr.addEventListener('load', () => {
      if (xhr.status === 401) {
        logout(true);
        return reject(new Error('Session expired'));
      }
      if (xhr.status >= 200 && xhr.status < 300) {
        bar.style.width = '100%';
        status.textContent = 'Done';
        rowEl.classList.add('done');
        resolve();
      } else {
        let msg = `HTTP ${xhr.status}`;
        try { msg = (JSON.parse(xhr.responseText).error) || msg; } catch {}
        reject(new Error(msg));
      }
    });
    xhr.addEventListener('error', () => reject(new Error('Network error')));
    xhr.addEventListener('abort', () => reject(new Error('Aborted')));
    xhr.send(fd);
  });
}

function openEditPhoto(series, p){
  const form = $('#form-edit-photo');
  form.dataset.seriesId = series.id;
  form.id.value = p.id;
  form.title.value = p.title || '';
  form.cam.value = p.cam || '';
  form.lens.value = p.lens || '';
  form.iso.value = p.iso || '';
  form.ss.value = p.ss || '';
  form.ap.value = p.ap || '';
  form.img.value = p.img || '';
  form.image.value = '';
  // Pre-fill the date picker from the stored ISO string if present.
  // <input type="datetime-local"> wants "YYYY-MM-DDTHH:MM" in local time.
  if (p.taken_at) {
    const d = new Date(p.taken_at);
    if (!Number.isNaN(d.getTime())) {
      const pad = n => String(n).padStart(2,'0');
      form.taken_at.value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    } else {
      form.taken_at.value = '';
    }
  } else {
    form.taken_at.value = '';
  }
  $('#modal-edit-photo').classList.add('open');
}

$('#form-edit-photo').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const form = e.target;
  const id = form.id.value;
  const fd = new FormData();
  ['title','cam','lens','iso','ss','ap'].forEach(k => fd.append(k, form[k].value));
  // Normalize datetime-local wall time -> UTC ISO so it round-trips correctly across timezones.
  const takenLocal = (form.taken_at.value || '').trim();
  let takenIso = '';
  if (takenLocal) {
    const d = new Date(takenLocal);
    if (!Number.isNaN(d.getTime())) takenIso = d.toISOString();
  }
  fd.append('taken_at', takenIso);
  if (form.image.files[0]) {
    fd.append('image', form.image.files[0]);
  } else {
    fd.append('img', form.img.value);
  }
  try {
    await api('PUT', `/api/photos/${id}`, fd);
    $('#modal-edit-photo').classList.remove('open');
    toast('Photo updated', 'success');
    loadSeries();
  } catch (err) {
    toast(err.message, 'error');
  }
});

async function deletePhoto(series, p){
  if (!confirm(`Delete photo "${p.title || 'untitled'}"?`)) return;
  try {
    await api('DELETE', `/api/photos/${p.id}`);
    toast('Photo deleted', 'success');
    state.openSeriesId = series.id;
    loadSeries();
  } catch (err) {
    toast(err.message, 'error');
  }
}

$$('[data-close]').forEach(b => b.addEventListener('click', e => {
  e.target.closest('.modal').classList.remove('open');
}));
$$('.modal').forEach(m => m.addEventListener('click', e => {
  if (e.target === m) m.classList.remove('open');
}));

  if (!state.token) return showLogin();
  try {
    await api('GET', '/api/auth/me');
    showDash();
  } catch {
    showLogin();
  }
})();
